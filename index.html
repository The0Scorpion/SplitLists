<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>List Splitter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <main class="container">
      <header class="hero">
        <p class="eyebrow">GitHub Pages Ready</p>
        <h1>Dynamic List Splitter</h1>
        <p>
          Upload one CSV list and split it into multiple files by records per file.
          Works with irregular rows and keeps your header.
        </p>
      </header>

      <section class="card controls">
        <label class="field">
          <span>CSV File</span>
          <input id="fileInput" type="file" accept=".csv,text/csv" />
        </label>

        <label class="field">
          <span>Records Per File</span>
          <input id="chunkSizeInput" type="number" min="1" step="1" value="10000" />
        </label>

        <label class="field">
          <span>Output File Prefix</span>
          <input id="prefixInput" type="text" placeholder="split_list" />
        </label>

        <button id="splitBtn" class="primary">Split List</button>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card results">
        <div class="results-header">
          <h2>Generated Files</h2>
          <button id="downloadAllBtn" class="secondary" disabled>Download All</button>
        </div>
        <ul id="resultList" class="result-list"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
